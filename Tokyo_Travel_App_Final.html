<button onclick="exportData()">백업</button>
<button onclick="importData()">복원</button>
<button onclick="resetData()">초기화</button>

<input type="file" id="restoreFile" style="display:none">

<script>
function exportData(){
 const data={};
 for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);data[k]=localStorage.getItem(k);}
 const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='tokyo-guide-backup.json';
 a.click();
}

function importData(){
 document.getElementById('restoreFile').click();
}

document.getElementById('restoreFile').addEventListener('change', async (e)=>{
 const file=e.target.files[0];
 if(!file) return;
 const txt=await file.text();
 const data=JSON.parse(txt);
 Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));
 alert('복원 완료. 새로고침합니다.');
 location.reload();
});

function resetData(){
 if(confirm('모든 체크리스트 데이터를 삭제할까요?')){
   localStorage.clear();
   location.reload();
 }
}
</script>

function PackingSection() {
  const allItems = packingData.flatMap((g, gi) => g.items.map((item, ii) => `${gi}_${ii}`));
  const [checked, setChecked] = useState(() => {

    setChecked(next);
    try { localStorage.setItem("packing_v2", JSON.stringify(next)); } catch {}
  };
  const done = allItems.filter(k => checked[k]).length;
  return (
    <div>
      <Alert type="red"><b>⛔ 이것만은 절대 빠뜨리면 안 돼요</b><br />여권 유효기간 6개월 이상 남아있는지 꼭 확인! 여권 사진 페이지는 폰에 사진으로도 저장해두세요.</Alert>

            </tr></thead>
            <tbody>{group.items.map((item, ii) => {
              const key = `${gi}_${ii}`;
              const isChecked = !!checked[key];
              return (
                <tr key={ii} onClick={() => toggle(key)} style={{ cursor: "pointer", borderBottom: `0.5px solid ${COLORS.border}`, opacity: isChecked ? 0.4 : 1, background: isChecked ? "#f3f4f6" : "transparent", transition: ".2s" }}>

              const dotColor = item.hl ? COLORS.red : item.tagType === "g" ? COLORS.gold : item.tagType === "t" ? COLORS.teal : COLORS.border;
              return (
                <div key={ii} style={{ position: "relative", marginBottom: 13 }}>
                  <div style={{ position: "absolute", left: -17, top: 7, width: 8, height: 8, borderRadius: "50%", background: dotColor, border: `2px solid ${COLORS.paper}` }} />
                  <div style={{ background: "#fff", border: `0.5px solid ${COLORS.border}`, borderRadius: 10, padding: "11px 13px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 3 }}>
                      <span style={{ fontSize: 13, fontWeight: 700 }}>{item.name}</span>
                      <span style={{ fontSize: 10, fontFamily: "monospace", color: COLORS.ink3, flexShrink: 0, marginTop: 2 }}>{item.time}</span>
                    </div>
                    <div style={{ fontSize: 12, color: COLORS.ink3, lineHeight: 1.65 }}>{item.desc}</div>
                    <span style={{ display: "inline-block", fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 100, marginTop: 5, background: tBg, color: tColor }}>{item.tag}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function ShoppingSection() {
  const allKeys = shoppingGroups.flatMap((g, gi) => g.items.map((_, ii) => `${gi}_${ii}`));
  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem("shopping_v2") || "{}"); } catch { return {}; }
  });
  const toggle = (key) => {
    const next = { ...checked, [key]: !checked[key] };
    setChecked(next);
    try { localStorage.setItem("shopping_v2", JSON.stringify(next)); } catch {}
  };
  const total = shoppingGroups.flatMap((g, gi) => g.items.map((item, ii) => checked[`${gi}_${ii}`] ? item.price : 0)).reduce((a, b) => a + b, 0);

  return (
    <div>
      <Alert type="gold"><b>💡 쇼핑 팁</b><br />돈키호테·마츠모토키요시·코쿠민 드럭스토어 가격 비교 추천.<br />면세는 보통 ¥5,500 이상부터 가능!</Alert>
      {shoppingGroups.map((group, gi) => (
        <div key={gi}>
          <div style={subTitle}>{group.title}</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5, marginBottom: 14 }}>
            <thead><tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
              {["상품", "가격", "매장", "메모", "✓"].map(h => (
                <th key={h} style={{ textAlign: "left", fontSize: 10, fontWeight: 600, color: COLORS.ink3, letterSpacing: ".07em", textTransform: "uppercase", padding: "8px 6px" }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{group.items.map((item, ii) => {
              const key = `${gi}_${ii}`;
              const isChecked = !!checked[key];
              return (
                <tr key={ii} onClick={() => toggle(key)} style={{ cursor: "pointer", borderBottom: `0.5px solid ${COLORS.border}`, opacity: isChecked ? 0.4 : 1, background: isChecked ? "#f3f4f6" : "transparent", transition: ".2s" }}>
                  <td style={{ padding: "9px 6px", fontWeight: 600, textDecoration: isChecked ? "line-through" : "none", fontSize: 12 }}>{item.name}</td>
                  <td style={{ padding: "9px 6px", color: COLORS.red, fontFamily: "monospace", fontWeight: 500, whiteSpace: "nowrap", fontSize: 12 }}>¥{item.price.toLocaleString()}</td>
                  <td style={{ padding: "9px 6px", color: COLORS.teal, fontWeight: 700, fontSize: 11 }}>{item.store}</td>
                  <td style={{ padding: "9px 6px", color: COLORS.ink3, lineHeight: 1.6, fontSize: 11 }}>{item.note}</td>
                  <td style={{ padding: "9px 6px", textAlign: "center" }}><input type="checkbox" readOnly checked={isChecked} style={{ width: 18, height: 18 }} /></td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      ))}
      <div style={{ position: "sticky", bottom: 16, background: COLORS.ink, color: "#fff", padding: 16, borderRadius: 18, marginTop: 28, fontSize: 18, fontWeight: 800, textAlign: "center", boxShadow: "0 10px 30px rgba(0,0,0,.18)", zIndex: 99 }}>
        현재 담은 금액 : ¥{total.toLocaleString()}
      </div>
    </div>
  );
}
